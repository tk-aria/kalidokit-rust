name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (all, linux, macos, windows)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - macos
          - windows

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kalidokit-rust

jobs:
  # ---------- Linux (glibc, zigbuild for glibc 2.17 compat) ----------
  build-linux:
    name: Build (x86_64-unknown-linux-gnu)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libx11-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-zigbuild and Zig
        run: |
          cargo install cargo-zigbuild
          pip3 install ziglang

      - name: Cache ONNX Runtime build
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: /tmp/ort-build
          key: ort-glibc-static-v1.20.1-v1

      - name: Build ONNX Runtime from source (static, glibc)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          # Pre-clone Eigen at the exact commit ORT v1.20.1 expects
          # (avoids FetchContent zip download hash mismatch from GitLab)
          git clone https://gitlab.com/libeigen/eigen.git /tmp/eigen-src
          cd /tmp/eigen-src
          git checkout e7248b26a1ed53fa030c5c459f7ea095dfd276ac
          cd /

          git clone --depth 1 --branch v1.20.1 \
            https://github.com/microsoft/onnxruntime /tmp/ort-src
          cd /tmp/ort-src

          ./build.sh --config Release \
            --update --build --parallel $(nproc) \
            --skip_tests \
            --compile_no_warning_as_error \
            --cmake_extra_defines CMAKE_POSITION_INDEPENDENT_CODE=ON \
            --cmake_extra_defines onnxruntime_BUILD_SHARED_LIB=OFF \
            --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=OFF \
            --cmake_extra_defines FETCHCONTENT_SOURCE_DIR_EIGEN=/tmp/eigen-src

          mkdir -p /tmp/ort-build
          cp -a build/Linux/* /tmp/ort-build/

      - name: Build release binary
        env:
          ORT_LIB_PATH: /tmp/ort-build/Release
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-x86_64-unknown-linux-gnu"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/x86_64-unknown-linux-gnu/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.ASSET }}

  # ---------- macOS ----------
  build-macos:
    name: Build (aarch64-apple-darwin)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-aarch64-apple-darwin"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/aarch64-apple-darwin/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-apple-darwin
          path: ${{ env.ASSET }}

  # ---------- Windows ----------
  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $archiveName = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path $archiveName
          Copy-Item "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe" "$archiveName/"
          if (Test-Path "assets") { Copy-Item -Recurse "assets" "$archiveName/" }
          Compress-Archive -Path "$archiveName" -DestinationPath "$archiveName.zip"
          echo "ASSET=$archiveName.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-pc-windows-msvc
          path: ${{ env.ASSET }}

  # ---------- GitHub Release ----------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/') && !failure() && !cancelled()
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
