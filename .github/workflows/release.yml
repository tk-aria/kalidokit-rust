name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kalidokit-rust

jobs:
  # ---------- Linux (glibc, zigbuild for glibc 2.17 compat) ----------
  build-linux:
    name: Build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libx11-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-zigbuild and Zig
        run: |
          cargo install cargo-zigbuild
          pip3 install ziglang

      - name: Cache ONNX Runtime build
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: /tmp/ort-build
          key: ort-glibc-static-v1.20.1-v1

      - name: Build ONNX Runtime from source (static, glibc)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.20.1 \
            https://github.com/microsoft/onnxruntime /tmp/ort-src
          cd /tmp/ort-src

          ./build.sh --config Release \
            --update --build --parallel $(nproc) \
            --skip_tests \
            --compile_no_warning_as_error \
            --cmake_extra_defines CMAKE_POSITION_INDEPENDENT_CODE=ON \
            --cmake_extra_defines onnxruntime_BUILD_SHARED_LIB=OFF \
            --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=OFF

          mkdir -p /tmp/ort-build
          cp -a build/Linux/* /tmp/ort-build/

      - name: Build release binary
        env:
          ORT_LIB_PATH: /tmp/ort-build/Release
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-x86_64-unknown-linux-gnu"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/x86_64-unknown-linux-gnu/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.ASSET }}

  # ---------- macOS / Windows ----------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$archiveName/"
          if (Test-Path "assets") { Copy-Item -Recurse "assets" "$archiveName/" }
          Compress-Archive -Path "$archiveName" -DestinationPath "$archiveName.zip"
          echo "ASSET=$archiveName.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ---------- GitHub Release ----------
  release:
    name: Create GitHub Release
    needs: [build-linux, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
