name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kalidokit-rust

jobs:
  # ---------- Linux (musl static binary) ----------
  build-linux:
    name: Build (x86_64-unknown-linux-musl)
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: Install system dependencies
        run: |
          apk add --no-cache \
            build-base cmake python3 py3-numpy py3-pip py3-flatbuffers git curl bash \
            linux-headers pkgconfig perl \
            libx11-dev libxkbcommon-dev wayland-dev mesa-dev \
            openssl-dev openssl-libs-static zlib-dev zlib-static \
            clang-dev

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          export HOME=/root
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-musl
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache ONNX Runtime build
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: /tmp/ort-build
          key: ort-musl-static-v1.20.1-alpine321-v10

      - name: Build ONNX Runtime from source (static, musl)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        env:
          HOME: /root
        run: |
          # musl doesn't have execinfo.h (glibc extension for backtrace)
          # Provide a no-op stub - ORT only uses it for debug diagnostics
          mkdir -p /usr/local/include
          cat > /usr/local/include/execinfo.h << 'STUB'
          #ifndef _EXECINFO_H
          #define _EXECINFO_H
          static inline int backtrace(void **b, int s) { (void)b; (void)s; return 0; }
          static inline char **backtrace_symbols(void *const *b, int s) { (void)b; (void)s; return 0; }
          static inline void backtrace_symbols_fd(void *const *b, int s, int f) { (void)b; (void)s; (void)f; }
          #endif
          STUB

          # Pre-clone Eigen at the exact commit ORT v1.20.1 expects
          # (avoids FetchContent zip download hash mismatch from GitLab)
          git clone https://gitlab.com/libeigen/eigen.git /tmp/eigen-src
          cd /tmp/eigen-src
          git checkout e7248b26a1ed53fa030c5c459f7ea095dfd276ac
          cd /

          git clone --depth 1 --branch v1.20.1 \
            https://github.com/microsoft/onnxruntime /tmp/ort-src
          cd /tmp/ort-src

          # Patch out execinfo.h usage in source (belt-and-suspenders with stub header)
          sed -i 's|#include <execinfo.h>|// execinfo.h removed for musl|' \
            onnxruntime/core/platform/posix/stacktrace.cc || true
          sed -i 's|backtrace(array, size)|0|; s|backtrace_symbols(array, nSize)|nullptr|' \
            onnxruntime/core/platform/posix/stacktrace.cc || true

          # Build static libraries only (no shared lib, no tests)
          # - FETCHCONTENT_SOURCE_DIR_EIGEN: use pre-cloned Eigen (correct version)
          # - compile_no_warning_as_error: GCC 14.2 false positives with -Werror
          # - ENABLE_BACKTRACE=OFF: execinfo.h unavailable on musl
          # - BUILD_UNIT_TESTS=OFF: flatbuffers uses strtoll_l (glibc-only) in test code
          # - FLATBUFFERS_LOCALE_INDEPENDENT=0: musl lacks strtoll_l/strtoull_l
          ./build.sh --config Release \
            --update --build --parallel $(nproc) \
            --skip_tests \
            --allow_running_as_root \
            --compile_no_warning_as_error \
            --cmake_extra_defines CMAKE_POSITION_INDEPENDENT_CODE=ON \
            --cmake_extra_defines onnxruntime_BUILD_SHARED_LIB=OFF \
            --cmake_extra_defines onnxruntime_ENABLE_BACKTRACE=OFF \
            --cmake_extra_defines onnxruntime_BUILD_UNIT_TESTS=OFF \
            --cmake_extra_defines FETCHCONTENT_SOURCE_DIR_EIGEN=/tmp/eigen-src \
            --cmake_extra_defines CMAKE_CXX_FLAGS="-DFLATBUFFERS_LOCALE_INDEPENDENT=0"

          # Copy build output for caching
          mkdir -p /tmp/ort-build
          cp -a build/Linux/* /tmp/ort-build/

      - name: Build release binary
        env:
          ORT_LIB_PATH: /tmp/ort-build/Release
          HOME: /root
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-x86_64-unknown-linux-musl"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/x86_64-unknown-linux-musl/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-musl
          path: ${{ env.ASSET }}

  # ---------- macOS / Windows ----------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp -r assets "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$archiveName/"
          if (Test-Path "assets") { Copy-Item -Recurse "assets" "$archiveName/" }
          Compress-Archive -Path "$archiveName" -DestinationPath "$archiveName.zip"
          echo "ASSET=$archiveName.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ---------- GitHub Release ----------
  release:
    name: Create GitHub Release
    needs: [build-linux, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
